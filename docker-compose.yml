services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ibnbatouta-website:latest
    restart: unless-stopped
    command: node website-server.js
    environment:
      - NODE_ENV=production
      - PORT=${WEBSITE_PORT:-5500}
    ports:
      # Bind to localhost for safer local/manual debugging; Coolify routes through its proxy.
      - "127.0.0.1:${WEBSITE_PORT:-5500}:${WEBSITE_PORT:-5500}"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/assets/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${WEBSITE_PORT:-5500}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    # In Coolify, assign this service domain as: http://your-main-domain.com:5500

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ibnbatouta-admin:latest
    restart: unless-stopped
    command: node admin-server.js
    environment:
      - NODE_ENV=production
      - PORT=${ADMIN_PORT:-5600}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin}
    ports:
      # Bind to localhost for safer local/manual debugging; Coolify routes through its proxy.
      - "127.0.0.1:${ADMIN_PORT:-5600}:${ADMIN_PORT:-5600}"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/assets/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${ADMIN_PORT:-5600}/admin.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    # In Coolify, assign this service domain as: http://admin.your-main-domain.com:5600

volumes:
  app_data:
  app_uploads:

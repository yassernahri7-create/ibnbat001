name: Build and Deploy to Coolify

on:
  push:
    branches:
      - main
      - staging  # Support for future scaling to staging environments

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_and_push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Basic tests placeholder (e.g. static analysis or simple shell checks)
      - name: Basic Tests
        run: |
          echo "Running basic checks..."
          if [ ! -f "website-server.js" ] || [ ! -f "admin-server.js" ]; then
            echo "Critical server files are missing!"
            exit 1
          fi
          echo "Checks passed successfully."

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Coolify Deployment
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Coolify (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "${{ secrets.COOLIFY_WEBHOOK_PROD }}" ]; then
            echo "Warning: COOLIFY_WEBHOOK_PROD secret is not set. Deployment trigger skipped."
          else
            echo "Triggering Coolify Production Webhook..."
            curl -X POST --max-time 30 -sSf "${{ secrets.COOLIFY_WEBHOOK_PROD }}"
            echo "Deployment triggered successfully."
          fi

      - name: Deploy to Coolify (Staging)
        if: github.ref == 'refs/heads/staging'
        run: |
          if [ -z "${{ secrets.COOLIFY_WEBHOOK_STAGING }}" ]; then
            echo "Warning: COOLIFY_WEBHOOK_STAGING secret is not set. Deployment trigger skipped."
          else
            echo "Triggering Coolify Staging Webhook..."
            curl -X POST --max-time 30 -sSf "${{ secrets.COOLIFY_WEBHOOK_STAGING }}"
            echo "Deployment triggered successfully."
          fi
